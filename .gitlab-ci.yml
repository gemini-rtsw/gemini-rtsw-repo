variables:
  REPO_PATH: "repo"
  API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}"

update-repo-metadata:
  image: rockylinux:9
  script:
    # Install required tools
    - dnf install -y --allowerasing curl jq createrepo_c

    # Create repo directory structure
    - mkdir -p $REPO_PATH

    # Download all RPMs from the generic package repository
    - |
      # Get list of files directly from the package version
      echo "Fetching package files..."
      curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --output "files.json" \
           "${API_URL}/packages/generic/rpm-repo/1.0"

      echo "Files response:"
      cat files.json

      # Download each RPM file
      for file in $(jq -r '.[] | select(.file_name | endswith(".rpm")) | .file_name' files.json); do
        echo "Downloading $file..."
        curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --output "$REPO_PATH/$file" \
             "${API_URL}/packages/generic/rpm-repo/1.0/$file"
      done

      # List downloaded RPMs
      echo "Downloaded RPMs:"
      ls -l $REPO_PATH/*.rpm || echo "No RPMs found"

    # Generate repository metadata
    - createrepo_c $REPO_PATH

    # Upload the repodata back to GitLab
    - |
      cd $REPO_PATH/repodata
      for file in *; do
        echo "Uploading $file..."
        curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$file" \
             "${API_URL}/packages/generic/rpm-repo/1.0/repodata/$file"
      done

  artifacts:
    paths:
      - ${REPO_PATH}
    expire_in: 1 week

  rules:
    - if: $CI_PIPELINE_SOURCE == "package" || $CI_PIPELINE_SOURCE == "push"
      when: always
    - when: manual 