variables:
  REPO_PATH: "repo"
  PROJECT_ID: "66226575"

update-repo-metadata:
  image: rockylinux:9
  script:
    # Install required packages
    - dnf install -y --allowerasing createrepo_c curl jq

    # Create repo directory
    - mkdir -p $REPO_PATH/repodata

    # Get list of RPMs from the generic package registry
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        "https://gitlab.com/api/v4/projects/${PROJECT_ID}/packages/generic/rpm-repo/1.0/" \
        | jq -r '.[] | .file_name' > ${REPO_PATH}/package_list.txt

    # Create repodata
    - |
      for rpm in $(cat ${REPO_PATH}/package_list.txt); do
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          -L -o "${REPO_PATH}/${rpm}" \
          "https://gitlab.com/api/v4/projects/${PROJECT_ID}/packages/generic/rpm-repo/1.0/${rpm}"
      done

    # Create repo metadata
    - createrepo_c --database $REPO_PATH

  artifacts:
    paths:
      - ${REPO_PATH}
    expire_in: 1 week

  rules:
    - changes:
        - packages/**/*
    - when: manual      # Allow manual runs 