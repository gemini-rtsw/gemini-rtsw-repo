variables:
  REPO_PATH: "repo"
  API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/rpm"

update-repo-metadata:
  image: rockylinux:9
  script:
    # Install required tools
    - dnf install -y curl jq

    # For each RPM package in the repository, create package registry metadata
    - |
      for rpm in packages/*.rpm; do
        if [ -f "$rpm" ]; then
          # Extract RPM metadata
          NAME=$(rpm -qp --queryformat '%{NAME}' "$rpm")
          VERSION=$(rpm -qp --queryformat '%{VERSION}' "$rpm")
          RELEASE=$(rpm -qp --queryformat '%{RELEASE}' "$rpm")
          ARCH=$(rpm -qp --queryformat '%{ARCH}' "$rpm")
          
          # Create JSON payload for GitLab API
          JSON_PAYLOAD=$(jq -n \
            --arg name "$NAME" \
            --arg version "$VERSION" \
            --arg release "$RELEASE" \
            --arg arch "$ARCH" \
            '{
              "name": $name,
              "version": $version,
              "release": $release,
              "arch": $arch,
              "distribution": "el9"
            }')
          
          # Send metadata to GitLab Package Registry
          curl --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
               --header "Content-Type: application/json" \
               --data "$JSON_PAYLOAD" \
               --output "/tmp/response.json" \
               "${API_URL}"
          
          # Check response
          if [ $? -ne 0 ]; then
            echo "Failed to update metadata for $rpm"
            cat /tmp/response.json
            exit 1
          fi
        fi
      done

  artifacts:
    paths:
      - /tmp/response.json
    expire_in: 1 week

  rules:
    - changes:
        - packages/**/*
    - when: manual      # Allow manual runs 