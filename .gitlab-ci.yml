variables:
  REPO_PATH: "repo"
  API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/rpm"

update-repo-metadata:
  image: rockylinux:9
  script:
    # Install required tools
    - dnf install -y --allowerasing curl jq createrepo_c

    # Create repo directory structure
    - mkdir -p $REPO_PATH

    # Download all RPMs from the package registry
    - |
      for package in $(curl --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
                           "${API_URL}/rpms" | jq -r '.[] | .file_name'); do
        curl --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
             --output "$REPO_PATH/$package" \
             "${API_URL}/rpms/files/$package"
      done

    # Generate repository metadata
    - createrepo_c $REPO_PATH

    # Upload the repodata back to GitLab
    - |
      cd $REPO_PATH/repodata
      for file in *; do
        curl --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$file" \
             "${API_URL}/repodata/$file"
      done

  artifacts:
    paths:
      - ${REPO_PATH}
    expire_in: 1 week

  rules:
    - if: $CI_PIPELINE_SOURCE == "package"
      when: always
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - when: manual 