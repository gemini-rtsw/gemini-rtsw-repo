variables:
  REPO_PATH: "repo"
  GITLAB_API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/34287433/package_files"

update-repo-metadata:
  image: rockylinux:9
  script:
    # Install required packages with --allowerasing to handle curl conflict
    - dnf install -y --allowerasing createrepo_c curl jq

    # Create repo directory
    - mkdir -p $REPO_PATH

    # Download one small RPM for testing
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          "${CI_PROJECT_URL}/-/package_registry/rpm/ecsmotorrecord-devel-2.8.22-0.git.19.a2242a8.x86_64.rpm" \
          -o "${REPO_PATH}/ecsmotorrecord-devel-2.8.22-0.git.19.a2242a8.x86_64.rpm"

    # Create repo metadata
    - createrepo_c --database --update $REPO_PATH

  artifacts:
    paths:
      - ${REPO_PATH}
    expire_in: 1 week

  rules:
    - changes:
        - packages/**/*
    - when: manual      # Allow manual runs 