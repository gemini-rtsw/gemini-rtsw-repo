variables:
  REPO_PATH: "repo"
  GITLAB_API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/34287433/package_files"

update-repo-metadata:
  image: rockylinux:9
  script:
    # Install required packages with --allowerasing to handle curl conflict
    - dnf install -y --allowerasing createrepo_c curl jq yum-utils

    # Create repo directory
    - mkdir -p $REPO_PATH

    # Debug: show API response and structure
    - |
      echo "Project ID: ${CI_PROJECT_ID}"
      echo "API URL: ${GITLAB_API_URL}"
      curl -v --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          "${GITLAB_API_URL}" | tee /tmp/response.json
      echo "API Response Structure:"
      cat /tmp/response.json | jq '.'

    # Generate repo file and download RPM headers
    - |
      if [ "$(cat /tmp/response.json | jq '. | length')" -gt 0 ]; then
        # Create the repo file
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            "${GITLAB_API_URL}" | \
        jq -r '.[] | select(.file_type=="rpm") | 
        "[gitlab-rpm-repo]
        name=GitLab RPM Repository
        baseurl=$CI_PROJECT_URL/-/package_registry/rpm
        enabled=1
        gpgcheck=0"' > /etc/yum.repos.d/gitlab.repo

        # Download RPM metadata for each package
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            "${GITLAB_API_URL}" | \
        jq -r '.[] | select(.file_type=="rpm") | .file_name' | while read rpm_file; do
          echo "Getting metadata for ${rpm_file}..."
          yumdownloader --destdir=${REPO_PATH} --urls ${rpm_file%%.rpm} | \
          while read url; do
            curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
                --head \
                "${CI_PROJECT_URL}/-/package_registry/rpm/${rpm_file}" | \
            awk -v url="${CI_PROJECT_URL}/-/package_registry/rpm/${rpm_file}" \
                -v file="${REPO_PATH}/${rpm_file}" \
                'BEGIN {print "Location: " url > file; print "Size: " $2 > file}'
          done
        done
        
        echo "Created repo file:"
        cat /etc/yum.repos.d/gitlab.repo
      else
        echo "No RPM packages found in the registry"
      fi

    # Create repo metadata using the package information
    - createrepo_c --database --update --baseurl="${CI_PROJECT_URL}/-/package_registry/rpm" $REPO_PATH

  artifacts:
    paths:
      - ${REPO_PATH}
      - /tmp/response.json
    expire_in: 1 week

  rules:
    - changes:
        - packages/**/*
    - when: manual      # Allow manual runs 