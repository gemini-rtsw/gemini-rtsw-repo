variables:
  REPO_PATH: "rpms"
  API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}"
  IS_PROD: "false"  # Default to non-prod repository

stages:
  - sync
  - build

# Repository sync job - can be configured to sync either default or production repository
sync-repository:
  stage: sync
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    # Install required tools
    - apk add --no-cache curl jq bash file
    
    # Check if commit message contains [PROD_SYNC] tag and set IS_PROD accordingly
    - |
      if git log -1 --pretty=%B | grep -q "\[PROD_SYNC\]"; then
        echo "Production sync detected in commit message"
        export IS_PROD="true"
      fi
    
  script:
    # Create repo directory
    - mkdir -p $REPO_PATH
    
    # Update sync_repo.sh with CI variables
    - |
      sed -i \
        -e "s|TOKEN=\".*\"|TOKEN=\"${CI_JOB_TOKEN}\"|" \
        -e "s|PROJECT_ID=\".*\"|PROJECT_ID=\"${CI_PROJECT_ID}\"|" \
        -e "s|https://gitlab.com/api/v4|${CI_API_V4_URL}|g" \
        sync_repo.sh
    
    # Make script executable and run it
    - chmod +x sync_repo.sh
    - if [ "$IS_PROD" = "true" ]; then
        ./sync_repo.sh --prod;
      else
        ./sync_repo.sh;
      fi

  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $PACKAGE_EVENT == "push"'
      when: always
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - when: manual

# Note: To sync the production repository, run this job with IS_PROD=true variable
# Go to CI/CD > Pipelines > Run Pipeline and add the variable IS_PROD with value "true"

