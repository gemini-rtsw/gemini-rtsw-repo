variables:
  REPO_PATH: "repo"
  GITLAB_API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/34287433/package_files"

update-repo-metadata:
  image: rockylinux:9
  script:
    # Install required packages with --allowerasing to handle curl conflict
    - dnf install -y --allowerasing createrepo_c curl jq

    # Create repo directory
    - mkdir -p $REPO_PATH

    # Debug: show API response and structure
    - |
      echo "Project ID: ${CI_PROJECT_ID}"
      echo "API URL: ${GITLAB_API_URL}"
      curl -v --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          "${GITLAB_API_URL}" | tee /tmp/response.json
      echo "API Response Structure:"
      cat /tmp/response.json | jq '.'

    # Generate repo file and metadata files
    - |
      if [ "$(cat /tmp/response.json | jq '. | length')" -gt 0 ]; then
        # Create the repo file
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            "${GITLAB_API_URL}" | \
        jq -r '.[] | select(.file_type=="rpm") | 
        "[$CI_PROJECT_URL/-/package_registry/rpm/\(.file_name)]
        name=\(.file_name)
        baseurl=$CI_PROJECT_URL/-/package_registry/rpm
        enabled=1
        gpgcheck=0"' > ${REPO_PATH}/gitlab.repo

        # Create metadata files for each RPM
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            "${GITLAB_API_URL}" | \
        jq -r '.[] | select(.file_type=="rpm") | 
        "[\(.file_name)]
        location=\(.file_name)
        baseurl=$CI_PROJECT_URL/-/package_registry/rpm/\(.file_name)
        size=\(.size)
        sha256=\(.file_sha256)"' > ${REPO_PATH}/packages.metadata
        
        echo "Created repo file:"
        cat ${REPO_PATH}/gitlab.repo
        echo "Created metadata file:"
        cat ${REPO_PATH}/packages.metadata
      else
        echo "No RPM packages found in the registry"
      fi

    # Create repo metadata using the metadata files
    - createrepo_c --database --update --baseurl="${CI_PROJECT_URL}/-/package_registry/rpm" $REPO_PATH

  artifacts:
    paths:
      - ${REPO_PATH}
      - /tmp/response.json
    expire_in: 1 week

  rules:
    - changes:
        - packages/**/*
    - when: manual      # Allow manual runs 