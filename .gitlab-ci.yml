variables:
  REPO_PATH: "repo"
  GITLAB_API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/34287433/package_files"

update-repo-metadata:
  image: rockylinux:9
  script:
    # Install required packages with --allowerasing to handle curl conflict
    - dnf install -y --allowerasing createrepo_c curl jq

    # Create repo directory and subdirectories
    - mkdir -p $REPO_PATH/rpms

    # Debug: show API response and structure
    - |
      echo "Project ID: ${CI_PROJECT_ID}"
      echo "API URL: ${GITLAB_API_URL}"
      curl -v --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          "${GITLAB_API_URL}" | tee /tmp/response.json
      echo "API Response Structure:"
      cat /tmp/response.json | jq '.'

    # Generate primary.xml file directly
    - |
      if [ "$(cat /tmp/response.json | jq '. | length')" -gt 0 ]; then
        # Create primary.xml header
        cat > ${REPO_PATH}/primary.xml << EOF
      <?xml version="1.0" encoding="UTF-8"?>
      <metadata xmlns="http://linux.duke.edu/metadata/common" xmlns:rpm="http://linux.duke.edu/metadata/rpm" packages="$(cat /tmp/response.json | jq '. | length')">
      EOF

        # Add package entries
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            "${GITLAB_API_URL}" | \
        jq -r '.[] | select(.file_type=="rpm") | 
        "<package type=\"rpm\">
          <name>\(.file_name | split("-")[0])</name>
          <arch>\(.file_name | split(".")[-2])</arch>
          <version epoch=\"0\" ver=\"\(.file_name | split("-")[1])\" rel=\"\(.file_name | split("-")[2])\"/>
          <checksum type=\"sha256\" pkgid=\"YES\">\(.file_sha256)</checksum>
          <size package=\"\(.size)\"/>
          <location href=\"\(.file_name)\"/>
        </package>"' >> ${REPO_PATH}/primary.xml

        # Close primary.xml
        echo "</metadata>" >> ${REPO_PATH}/primary.xml

        echo "Created primary.xml:"
        cat ${REPO_PATH}/primary.xml
      else
        echo "No RPM packages found in the registry"
      fi

    # Create repo metadata using the primary.xml
    - createrepo_c --update --baseurl="${CI_PROJECT_URL}/-/package_registry/rpm" --retain-old-md 5 $REPO_PATH

  artifacts:
    paths:
      - ${REPO_PATH}
      - /tmp/response.json
    expire_in: 1 week

  rules:
    - changes:
        - packages/**/*
    - when: manual      # Allow manual runs 