variables:
  REPO_PATH: "repo"
  API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}"

update-repo-metadata:
  image: rockylinux:9
  script:
    # Install required tools
    - dnf install -y --allowerasing curl jq createrepo_c

    # Create repo directory structure
    - mkdir -p $REPO_PATH

    # Download all RPMs and create repo metadata
    - |
      # Get all RPM packages
      echo "Fetching RPM package list..."
      curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           "${API_URL}/packages?package_type=rpm" | tee packages.json

      # Download all RPM files
      echo "Looking for RPM files..."
      for package in $(jq -r '.[] | "\(.version) \(.name)"' packages.json); do
        version=$(echo $package | cut -d' ' -f1)
        name=$(echo $package | cut -d' ' -f2-)
        
        echo "Downloading RPM: $name version $version"
        
        # Download the RPM file
        HTTP_CODE=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --write-out "%{http_code}" \
             --output "$REPO_PATH/$name" \
             "${API_URL}/packages/rpm/$name/$version/download")
        
        if [ "$HTTP_CODE" != "200" ]; then
          echo "Error downloading $name (HTTP $HTTP_CODE)"
          cat "$REPO_PATH/$name" || true
          exit 1
        fi
        
        # Verify file size
        if [ $(stat -c%s "$REPO_PATH/$name") -lt 1024 ]; then
          echo "Error: $name appears to be too small or empty"
          exit 1
        fi
      done

      # List downloaded RPMs
      echo "Downloaded RPMs:"
      ls -l $REPO_PATH/*.rpm || echo "No RPMs found"

    # Generate repository metadata
    - createrepo_c $REPO_PATH

    # Upload the repodata back to GitLab
    - |
      cd $REPO_PATH/repodata
      for file in *; do
        echo "Uploading $file..."
        curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$file" \
             "${API_URL}/packages/generic/rpm-repo/1.0/repodata/$file"
      done

  artifacts:
    paths:
      - ${REPO_PATH}
    expire_in: 1 week

  rules:
    - if: $CI_PIPELINE_SOURCE == "package" || $CI_PIPELINE_SOURCE == "push"
      when: always
    - when: manual 