name: rebuild-latest

# Manually rebuild the combined yum image (rpm-repo:latest) from all rpm-*
# scratch tags. Use this to HEAL the image, or after backfill.
#
# Trigger from the GitHub UI: Actions -> rebuild-latest -> Run workflow.

on:
  workflow_dispatch:
    inputs:
      allow_shrink:
        description: 'Allow the rebuild to shrink (use after a prune that removed tags)'
        required: false
        default: 'false'

permissions:
  contents: read
  packages: write

jobs:
  rebuild:
    name: Rebuild rpm-repo:latest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Aggressively reclaim runner disk (~30-40GB) before pulling tags and
      # building the multi-GB image (build context + overlay).
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild and push :latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          # Prune-aware: when dispatched after a prune, allow the image to shrink
          # past the anti-truncation guard.
          PRUNE_REBUILD: ${{ inputs.allow_shrink == 'true' && '1' || '0' }}
        run: |
          df -h /
          chmod +x sync_repo.sh
          ./sync_repo.sh
