variables:
  REPO_PATH: "rpms"
  API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}"

update-repo-metadata:
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    # Install required tools
    - apk add --no-cache curl jq bash
    
  script:
    # Create repo directory
    - mkdir -p $REPO_PATH
    
    # Modify sync_repo.sh to use CI variables
    - |
      sed -i "s|TOKEN=\".*\"|TOKEN=\"${CI_JOB_TOKEN}\"|" sync_repo.sh
      sed -i "s|PROJECT_ID=\".*\"|PROJECT_ID=\"${CI_PROJECT_ID}\"|" sync_repo.sh
      sed -i "s|https://gitlab.com/api/v4|${CI_API_V4_URL}|g" sync_repo.sh
    
    # Make script executable and run it
    - chmod +x sync_repo.sh
    - ./sync_repo.sh

  artifacts:
    paths:
      - ${REPO_PATH}
    expire_in: 1 week

  rules:
    - if: $CI_PIPELINE_SOURCE == "package" || $CI_PIPELINE_SOURCE == "push"
      when: always
    - when: manual 