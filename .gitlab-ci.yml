variables:
  REPO_PATH: "rpms"
  API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}"

stages:
  - sync
  - build

# First stage to sync the repository
sync-repository:
  stage: sync
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    # Install required tools
    - apk add --no-cache curl jq bash file
    
  script:
    # Create repo directory
    - mkdir -p $REPO_PATH
    
    # Update sync_repo.sh with CI variables
    - |
      sed -i \
        -e "s|TOKEN=\".*\"|TOKEN=\"${CI_JOB_TOKEN}\"|" \
        -e "s|PROJECT_ID=\".*\"|PROJECT_ID=\"${CI_PROJECT_ID}\"|" \
        -e "s|https://gitlab.com/api/v4|${CI_API_V4_URL}|g" \
        sync_repo.sh
    
    # Make script executable and run it
    - chmod +x sync_repo.sh
    - ./sync_repo.sh

  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $PACKAGE_EVENT == "push"'
      when: always
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - when: manual

