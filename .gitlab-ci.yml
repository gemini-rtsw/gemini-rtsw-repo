variables:
  REPO_PATH: "repo"
  API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}"

update-repo-metadata:
  image: rockylinux:9
  script:
    # Install required tools
    - dnf install -y --allowerasing curl jq createrepo_c

    # Create repo directory structure
    - mkdir -p $REPO_PATH

    # Download all RPMs from the generic package repository
    - |
      # List all packages
      echo "Fetching package list..."
      curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --output "packages.json" \
           "${API_URL}/packages"

      echo "Package list response:"
      cat packages.json

      # Get files for each package
      for package_id in $(jq -r '.[].id' packages.json); do
        echo "Fetching files for package $package_id..."
        curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --output "files_${package_id}.json" \
             "${API_URL}/packages/${package_id}/package_files"
        
        # Download RPM files
        for file in $(jq -r '.[] | select(.file_name | endswith(".rpm")) | .file_name' "files_${package_id}.json"); do
          echo "Downloading $file..."
          HTTP_CODE=$(curl -v --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --write-out "%{http_code}" \
               --output "$REPO_PATH/$file" \
               "${API_URL}/packages/${package_id}/package_files/${file##*/}/download")
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error downloading $file (HTTP $HTTP_CODE)"
            # Print the response content for debugging
            cat "$REPO_PATH/$file"
            # Let's also see what's in the files JSON
            echo "Package files JSON:"
            cat "files_${package_id}.json"
            exit 1
          fi
          
          # Verify file size is reasonable (>1KB)
          if [ $(stat -c%s "$REPO_PATH/$file") -lt 1024 ]; then
            echo "Error: $file appears to be too small or empty"
            exit 1
          fi
        done
      done

      # List downloaded RPMs
      echo "Downloaded RPMs:"
      ls -l $REPO_PATH/*.rpm || echo "No RPMs found"

    # Generate repository metadata
    - createrepo_c $REPO_PATH

    # Upload the repodata back to GitLab
    - |
      cd $REPO_PATH/repodata
      for file in *; do
        echo "Uploading $file..."
        curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$file" \
             "${API_URL}/packages/generic/rpm-repo/1.0/repodata/$file"
      done

  artifacts:
    paths:
      - ${REPO_PATH}
    expire_in: 1 week

  rules:
    - if: $CI_PIPELINE_SOURCE == "package" || $CI_PIPELINE_SOURCE == "push"
      when: always
    - when: manual 