name: Sync RPM Repository

on:
  push:
    branches: [github-ci-setup, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  RPM_REPO_IMAGE: ghcr.io/gemini-rtsw/rpm-repo

jobs:
  sync-repository:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull existing RPM repo container
        run: |
          mkdir -p rpm-repo

          if docker pull "$RPM_REPO_IMAGE:latest" 2>/dev/null; then
            echo "Extracting existing RPMs from container..."
            CID=$(docker create "$RPM_REPO_IMAGE:latest" true)
            docker cp "$CID:/usr/share/nginx/html/rpm-repo/." "rpm-repo/" 2>/dev/null || true
            docker rm "$CID"
            rm -rf "rpm-repo/repodata"
            echo "Existing RPMs:"
            ls -1 rpm-repo/*.rpm 2>/dev/null || echo "(none)"
          else
            echo "No existing container image found, starting fresh"
          fi

      - name: Add new RPMs from source
        run: |
          if [ -d "rpms" ]; then
            for rpm in rpms/*.rpm; do
              [ -f "$rpm" ] || continue
              BASENAME=$(basename "$rpm")
              if [ ! -f "rpm-repo/$BASENAME" ]; then
                echo "Adding new RPM: $BASENAME"
                cp "$rpm" "rpm-repo/"
              else
                echo "Already exists: $BASENAME"
              fi
            done
          fi

      - name: Build and push RPM repo container
        run: |
          echo "RPMs to include:"
          ls -lh rpm-repo/*.rpm 2>/dev/null || echo "(none)"

          docker build -f Dockerfile.rpm-repo -t "$RPM_REPO_IMAGE:latest" .
          docker push "$RPM_REPO_IMAGE:latest"

          echo "Pushed $RPM_REPO_IMAGE:latest"
