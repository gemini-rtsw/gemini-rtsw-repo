name: rebuild-latest

# Manually rebuild rpm-repo:latest from all rpm-* scratch tags.
#
# Use this to HEAL :latest when a package is present as a scratch tag but
# missing from :latest -- e.g. after two matrix legs raced on the :latest
# rebuild and the loser's RPM got clobbered (it survives in its scratch tag,
# and this job re-merges it). No package rebuild needed.
#
# Trigger from the GitHub UI: Actions -> rebuild-latest -> Run workflow.
# Runs on a GitHub runner, so it does NOT use your local bandwidth (:latest is
# ~6GB to pull/push).

on:
  workflow_dispatch:
    inputs:
      allow_shrink:
        description: 'Allow publishing fewer RPMs than last time (override anti-truncation guard ONCE)'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  rebuild:
    name: Rebuild rpm-repo:latest from scratch tags
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # sync_repo.sh pulls the ~6GB :latest + all scratch tags and rebuilds --
      # free the runner disk first so it doesn't hit "No space left on device".
      - name: Free up disk space
        run: |
          sudo rm -rf /opt/hostedtoolcache /usr/local/lib/android \
            /usr/share/dotnet /usr/local/.ghcup /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild and push :latest
        env:
          # sync_repo.sh uses these to list rpm-* tags via the GHCR API.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          # Off by default; tick "allow_shrink" when running to override once.
          ALLOW_SHRINK: ${{ inputs.allow_shrink && '1' || '0' }}
        run: |
          chmod +x sync_repo.sh
          ./sync_repo.sh
