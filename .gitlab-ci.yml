variables:
  REPO_PATH: "repo"
  PROJECT_ID: "66226575"
  PACKAGE_ID: "34287433"

update-repo-metadata:
  image: rockylinux:9
  script:
    # Install required packages
    - dnf install -y --allowerasing createrepo_c curl jq

    # Create repo directory
    - mkdir -p $REPO_PATH/repodata

    # Get list of RPMs and debug the response
    - |
      echo "Getting package list..."
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        "https://gitlab.com/api/v4/projects/${PROJECT_ID}/packages/${PACKAGE_ID}/package_files" \
        | tee /tmp/response.json
      
      echo "API Response:"
      cat /tmp/response.json | jq '.'

      # Extract RPM filenames and download them
      cat /tmp/response.json | jq -r '.[] | .file_name' | while read rpm; do
        echo "Downloading $rpm..."
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          -L -o "${REPO_PATH}/${rpm}" \
          "https://gitlab.com/api/v4/projects/${PROJECT_ID}/packages/generic/rpm-repo/1.0/${rpm}"
      done

    # Create repo metadata
    - createrepo_c --database $REPO_PATH

  artifacts:
    paths:
      - ${REPO_PATH}
      - /tmp/response.json
    expire_in: 1 week

  rules:
    - changes:
        - packages/**/*
    - when: manual      # Allow manual runs 