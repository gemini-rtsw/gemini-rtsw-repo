variables:
  REPO_PATH: "repo"
  API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}"

update-repo-metadata:
  image: rockylinux:9
  script:
    # Install required tools
    - dnf install -y --allowerasing curl jq createrepo_c

    # Create repo directory structure
    - mkdir -p $REPO_PATH

    # Download all RPMs from the generic package repository
    - |
      # List all packages
      echo "Fetching package list..."
      curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --output "packages.json" \
           "${API_URL}/packages"

      echo "Package list response:"
      cat packages.json

      # Get files for each package
      for package_id in $(jq -r '.[].id' packages.json); do
        echo "Fetching files for package $package_id..."
        curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --output "files_${package_id}.json" \
             "${API_URL}/packages/${package_id}/package_files"
        
        echo "Files response for package $package_id:"
        cat "files_${package_id}.json"
        
        # Check if the response is valid JSON and has content
        if ! jq empty "files_${package_id}.json" 2>/dev/null; then
          echo "Invalid JSON response for package $package_id"
          continue
        fi
        
        if [ ! -s "files_${package_id}.json" ]; then
          echo "Empty response for package $package_id"
          continue
        fi
        
        # Download RPM files
        while IFS= read -r line; do
          if [ -z "$line" ]; then
            continue
          fi
          
          file=$(echo "$line" | jq -r '.file_name // empty')
          link=$(echo "$line" | jq -r '._links.download // empty')
          
          if [ -z "$file" ] || [ -z "$link" ]; then
            echo "Missing file_name or download link in response"
            continue
          fi
          
          if [[ $file == *.rpm ]]; then
            echo "Downloading $file from $link..."
            curl --silent --fail --show-error --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
                 --location \
                 --output "$REPO_PATH/$file" \
                 "$link"
            
            if [ $? -ne 0 ]; then
              echo "Failed to download $file"
              continue
            fi
            
            # Verify the downloaded file
            if [ ! -s "$REPO_PATH/$file" ]; then
              echo "Downloaded file $file is empty"
              rm -f "$REPO_PATH/$file"
              continue
            fi
          fi
        done < <(jq -c '.[]' "files_${package_id}.json" 2>/dev/null || echo '')
      done

      # List downloaded RPMs
      echo "Downloaded RPMs:"
      ls -l $REPO_PATH/*.rpm || echo "No RPMs found"

    # Generate repository metadata
    - createrepo_c $REPO_PATH

    # Upload the repodata back to GitLab
    - |
      cd $REPO_PATH/repodata
      for file in *; do
        echo "Uploading $file..."
        curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$file" \
             "${API_URL}/packages/generic/rpm-repo/1.0/repodata/$file"
      done

  artifacts:
    paths:
      - ${REPO_PATH}
    expire_in: 1 week

  rules:
    - if: $CI_PIPELINE_SOURCE == "package" || $CI_PIPELINE_SOURCE == "push"
      when: always
    - when: manual 