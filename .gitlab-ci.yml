variables:
  REPO_PATH: "repo"
  API_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}"

update-repo-metadata:
  image: rockylinux:9
  script:
    # Install required tools
    - dnf install -y --allowerasing curl jq createrepo_c

    # Create repo directory structure
    - mkdir -p $REPO_PATH

    # Download all RPMs and create repo metadata
    - |
      # Get all package files from the project
      echo "Fetching all package files..."
      curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           "${API_URL}/package_files" | tee package_files.json

      # Download all RPM files
      echo "Looking for RPM files..."
      for rpm_file in $(jq -r '.[] | select(.file_name | endswith(".rpm")) | "\(.file_name) \(.id)"' package_files.json); do
        file_name=$(echo $rpm_file | cut -d' ' -f1)
        file_id=$(echo $rpm_file | cut -d' ' -f2)
        
        echo "Downloading RPM: $file_name (ID: $file_id)"
        
        # Download the RPM file using its ID
        HTTP_CODE=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --write-out "%{http_code}" \
             --output "$REPO_PATH/$file_name" \
             "${API_URL}/package_files/$file_id/download")
        
        if [ "$HTTP_CODE" != "200" ]; then
          echo "Error downloading $file_name (HTTP $HTTP_CODE)"
          cat "$REPO_PATH/$file_name" || true
          exit 1
        fi
        
        # Verify file size
        if [ $(stat -c%s "$REPO_PATH/$file_name") -lt 1024 ]; then
          echo "Error: $file_name appears to be too small or empty"
          exit 1
        fi
      done

      # List downloaded RPMs
      echo "Downloaded RPMs:"
      ls -l $REPO_PATH/*.rpm || echo "No RPMs found"

    # Generate repository metadata
    - createrepo_c $REPO_PATH

    # Upload the repodata back to GitLab
    - |
      cd $REPO_PATH/repodata
      for file in *; do
        echo "Uploading $file..."
        curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$file" \
             "${API_URL}/packages/generic/rpm-repo/1.0/repodata/$file"
      done

  artifacts:
    paths:
      - ${REPO_PATH}
    expire_in: 1 week

  rules:
    - if: $CI_PIPELINE_SOURCE == "package" || $CI_PIPELINE_SOURCE == "push"
      when: always
    - when: manual 