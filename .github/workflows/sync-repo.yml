name: Sync RPM Repository

on:
  push:
    branches: [github-ci-setup, master]
  workflow_dispatch:
    inputs:
      is_prod:
        description: 'Sync production repository'
        required: false
        default: 'false'
        type: boolean

jobs:
  sync-repository:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y createrepo-c rpm jq

      - name: Determine repo type
        id: repo-type
        run: |
          IS_PROD="false"
          # Check workflow_dispatch input
          if [ "${{ github.event.inputs.is_prod }}" = "true" ]; then
            IS_PROD="true"
          fi
          # Check commit message for [PROD_SYNC] tag
          if git log -1 --pretty=%B | grep -q "\[PROD_SYNC\]"; then
            IS_PROD="true"
          fi
          echo "is_prod=$IS_PROD" >> "$GITHUB_OUTPUT"
          if [ "$IS_PROD" = "true" ]; then
            echo "repo_dir=prod" >> "$GITHUB_OUTPUT"
          else
            echo "repo_dir=rpm-repo" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Sync RPMs to gh-pages
        run: |
          REPO_DIR="${{ steps.repo-type.outputs.repo_dir }}"
          mkdir -p "gh-pages/$REPO_DIR"

          # Copy any RPMs from source branch rpms/ directory that aren't already in gh-pages
          if [ -d "rpms" ]; then
            for rpm in rpms/*.rpm; do
              [ -f "$rpm" ] || continue
              BASENAME=$(basename "$rpm")
              if [ ! -f "gh-pages/$REPO_DIR/$BASENAME" ]; then
                echo "Adding new RPM: $BASENAME"
                cp "$rpm" "gh-pages/$REPO_DIR/"
              fi
            done
          fi

      - name: Generate repository metadata
        run: |
          REPO_DIR="${{ steps.repo-type.outputs.repo_dir }}"
          rm -rf "gh-pages/$REPO_DIR/repodata"
          createrepo_c "gh-pages/$REPO_DIR"

      - name: Deploy to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Update RPM repository (${{ steps.repo-type.outputs.repo_dir }})"
            git push origin gh-pages
          fi
